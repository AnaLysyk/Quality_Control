name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Node deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Start server and wait
        run: |
          nohup npm run start > server.log 2>&1 &
          echo "Waiting for server at http://localhost:3000/"
          for i in {1..60}; do
            if curl --silent --head --fail http://localhost:3000/ >/dev/null 2>&1; then
              echo "Server ready"; break
            fi
            sleep 2
          done
      - name: Run Node tests
        run: npm run test
