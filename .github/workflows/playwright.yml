# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-jammy
      options: --user 1001 --ipc=host --init

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Run E2E with mock
        env:
          CI: "true"
          SUPABASE_MOCK: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          npm run dev -- --port 3000 &
          npx wait-on http://localhost:3000
          npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  prod-smoke:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_EMAIL: ${{ secrets.PLAYWRIGHT_EMAIL }}
      PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
    steps:
      - name: Skip job if not configured
        if: ${{ env.PLAYWRIGHT_BASE_URL == '' }}
        run: echo "PLAYWRIGHT_BASE_URL secret not set; skipping prod smoke."

      - uses: actions/checkout@v5
        if: ${{ env.PLAYWRIGHT_BASE_URL != '' }}
      - uses: actions/setup-node@v6
        if: ${{ env.PLAYWRIGHT_BASE_URL != '' }}
        with:
          node-version: 22
      - if: ${{ env.PLAYWRIGHT_BASE_URL != '' }}
        run: npm ci
      - name: Run E2E on production
        if: ${{ env.PLAYWRIGHT_BASE_URL != '' }}
        run: npm run test:e2e:prod

      - name: Upload Playwright report
        if: ${{ always() && env.PLAYWRIGHT_BASE_URL != '' }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 30
