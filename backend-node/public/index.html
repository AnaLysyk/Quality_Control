<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supabase Auth</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 48px 16px;
        background-color: #121212;
        color: #f5f5f5;
      }

      h1 {
        margin-bottom: 24px;
        font-size: 28px;
        font-weight: 600;
      }

      .container {
        max-width: 360px;
        margin: 0 auto;
        padding: 28px 24px 32px;
        background: #1e1e1e;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      }

      .section {
        margin-top: 28px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 20px;
        font-size: 14px;
        color: #c7c7c7;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #3b3b3b;
        border-radius: 999px;
        transition: 0.2s ease;
      }

      .slider::before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        top: 3px;
        background-color: #f5f5f5;
        border-radius: 50%;
        transition: 0.2s ease;
      }

      .switch input:checked + .slider {
        background-color: #2a8f5a;
      }

      .switch input:checked + .slider::before {
        transform: translateX(22px);
      }

      .auth-form {
        display: none;
        margin-top: 18px;
      }

      .auth-form.active {
        display: block;
      }

      input {
        display: block;
        width: 100%;
        padding: 12px 14px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #2d2d2d;
        background: #121212;
        color: #f5f5f5;
        font-size: 14px;
      }

      button {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: none;
        background: #2a8f5a;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #247a4c;
      }

      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #9a9a9a;
      }

      .s3-result {
        margin-top: 14px;
        padding: 12px;
        background: #121212;
        border-radius: 8px;
        border: 1px solid #2d2d2d;
        text-align: left;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .s3-list {
        list-style: none;
        padding: 0;
        margin: 12px 0 0;
        text-align: left;
        font-size: 13px;
      }

      .s3-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 0;
        border-bottom: 1px solid #2d2d2d;
      }

      .s3-list button {
        width: auto;
        padding: 6px 10px;
        font-size: 12px;
        background: #3b3b3b;
      }
    </style>
  </head>
  <body>
    <h1>Supabase Authentication</h1>
    <div class="container">
      <div class="toggle-container">
        <span>Login</span>
        <label class="switch">
          <input type="checkbox" id="toggleAuth" />
          <span class="slider"></span>
        </label>
        <span>Sign Up</span>
      </div>

      <form id="loginForm" action="/login" method="POST" class="auth-form active">
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <form id="signupForm" action="/signup" method="POST" class="auth-form">
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Sign Up</button>
      </form>

      <div class="hint">After login you will be redirected to /private.html.</div>
    </div>

    <div class="container section">
      <h2>S3 Tools</h2>
      <div class="stack">
        <form id="s3UploadForm" enctype="multipart/form-data">
          <input type="text" name="key" placeholder="Optional object key (e.g. uploads/file.txt)" />
          <input type="file" name="file" required />
          <button type="submit">Upload</button>
        </form>

        <form id="s3ListForm">
          <input type="text" name="prefix" placeholder="Prefix (optional)" />
          <input type="text" name="maxKeys" placeholder="Max keys (default 50)" />
          <button type="submit">List Objects</button>
        </form>

        <button id="s3NextButton" type="button" disabled>Next Page</button>
        <div id="s3Result" class="s3-result">Ready.</div>
        <ul id="s3List" class="s3-list"></ul>
      </div>
    </div>

    <script>
      const toggleAuth = document.getElementById("toggleAuth");
      const loginForm = document.getElementById("loginForm");
      const signupForm = document.getElementById("signupForm");

      toggleAuth.addEventListener("change", () => {
        if (toggleAuth.checked) {
          loginForm.classList.remove("active");
          signupForm.classList.add("active");
        } else {
          signupForm.classList.remove("active");
          loginForm.classList.add("active");
        }
      });

      const s3UploadForm = document.getElementById("s3UploadForm");
      const s3ListForm = document.getElementById("s3ListForm");
      const s3NextButton = document.getElementById("s3NextButton");
      const s3Result = document.getElementById("s3Result");
      const s3List = document.getElementById("s3List");
      let nextToken = null;
      let lastPrefix = "";
      let lastMaxKeys = "";

      function setResult(text) {
        s3Result.textContent = text;
      }

      function renderList(objects) {
        s3List.innerHTML = "";
        if (!objects || objects.length === 0) {
          const li = document.createElement("li");
          li.textContent = "No objects found.";
          s3List.appendChild(li);
          return;
        }
        objects.forEach((obj) => {
          const li = document.createElement("li");
          const label = document.createElement("span");
          label.textContent = `${obj.Key} (${obj.Size || 0} bytes)`;
          const del = document.createElement("button");
          del.type = "button";
          del.textContent = "Delete";
          del.addEventListener("click", async () => {
            if (!confirm(`Delete ${obj.Key}?`)) return;
            setResult("Deleting...");
            const res = await fetch(`/s3/object?key=${encodeURIComponent(obj.Key)}`, {
              method: "DELETE",
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              setResult(data.error || "Delete failed");
              return;
            }
            setResult(`Deleted ${obj.Key}`);
            await fetchList(lastPrefix, lastMaxKeys, null);
          });
          li.appendChild(label);
          li.appendChild(del);
          s3List.appendChild(li);
        });
      }

      async function fetchList(prefix, maxKeys, continuation) {
        const params = new URLSearchParams();
        if (prefix) params.set("prefix", prefix);
        if (maxKeys) params.set("maxKeys", maxKeys);
        if (continuation) params.set("continuationToken", continuation);
        setResult("Loading objects...");
        const res = await fetch(`/s3/objects?${params.toString()}`);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setResult(data.error || "Failed to list objects");
          return;
        }
        nextToken = data.nextToken;
        s3NextButton.disabled = !nextToken;
        renderList(data.objects || []);
        setResult(`Loaded ${data.objects?.length || 0} objects.`);
      }

      s3UploadForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(s3UploadForm);
        setResult("Uploading...");
        const res = await fetch("/s3/upload", {
          method: "POST",
          body: formData,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setResult(data.error || "Upload failed");
          return;
        }
        setResult(`Uploaded ${data.key}`);
        await fetchList(lastPrefix, lastMaxKeys, null);
      });

      s3ListForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const formData = new FormData(s3ListForm);
        lastPrefix = formData.get("prefix")?.toString() || "";
        lastMaxKeys = formData.get("maxKeys")?.toString() || "";
        await fetchList(lastPrefix, lastMaxKeys, null);
      });

      s3NextButton.addEventListener("click", async () => {
        if (!nextToken) return;
        await fetchList(lastPrefix, lastMaxKeys, nextToken);
      });
    </script>
  </body>
</html>
