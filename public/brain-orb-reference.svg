      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#dcecff" flood-opacity="0.32"/>
    </filter>
    <filter id="softAura" x="24" y="24" width="252" height="252" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
