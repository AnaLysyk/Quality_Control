name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_DISABLE_FONT_DOWNLOAD: "1"
      SKIP_PRISMA_MIGRATE: "true"
      E2E_USE_JSON: "1"
      AUTH_STORE: "json"
      USE_JSON_STORE: "true"
      # Só satisfaz a validação do prisma.config.ts (exige a env var definida
      # pra rodar "prisma generate"); os testes usam AUTH_STORE=json/
      # USE_JSON_STORE=true acima, não conectam nesse banco de verdade.
      DATABASE_URL: "postgresql://user:password@localhost:5432/quality_control_ci"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests with coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Run SonarCloud scan
        if: always()
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Report Sonar New Code coverage by file
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PULL_REQUEST: ${{ github.event.pull_request.number }}
          SONAR_BRANCH: ${{ github.ref_name }}
        run: node tools/functions/infraestrutura/qualidade/relatar-cobertura-new-code-sonar.mjs

      - name: Preserve coverage test failure
        if: always() && steps.coverage.outcome == 'failure'
        run: |
          echo "Unit tests with coverage failed; the SonarCloud scan was still executed."
          exit 1

  sonar-diagnostics:
    name: Sonar main New Code uncovered files
    needs: sonar
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print compact main New Code coverage ranking
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          url="https://sonarcloud.io/api/measures/component_tree?component=AnaLysyk_Quality_Control&metricKeys=new_coverage,new_lines_to_cover,new_uncovered_lines&strategy=leaves&qualifiers=FIL&ps=500&branch=main"
          curl --fail --silent --show-error --user "${SONAR_TOKEN}:" "$url" > /tmp/sonar-new-code.json
          echo "UNCOVERED | TO_COVER | COVERAGE | FILE"
          jq -r '
            def metric($name):
              ([.measures[]? | select(.metric == $name) | (.periods[0].value // .value // "0")][0] // "0") | tonumber;
            .components[]
            | { path: (.path // .name), coverage: metric("new_coverage"), toCover: metric("new_lines_to_cover"), uncovered: metric("new_uncovered_lines") }
            | select(.toCover > 0 or .uncovered > 0)
            | [.uncovered, .toCover, .coverage, .path]
            | @tsv
          ' /tmp/sonar-new-code.json | sort -t $'\t' -k1,1nr | head -80
