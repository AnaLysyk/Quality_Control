<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <style>
      .brain-orbit-soft { transform-origin: 120px 120px; animation: brainOrbitDrift 8.6s ease-in-out infinite; }
      .brain-orbit-led { transform-origin: 120px 120px; animation: brainOrbitSpeak 3.2s ease-in-out infinite; }
      .brain-face { transform-origin: 120px 120px; animation: brainFaceIdle 4.8s ease-in-out infinite; }
      .brain-eye-left { transform-origin: 105px 119px; animation: brainBlinkLeft 5.6s ease-in-out infinite; }
      .brain-eye-right { transform-origin: 143px 119px; animation: brainBlinkRight 5.6s ease-in-out infinite; }
      .brain-star { animation: brainStarPulse 4.2s ease-in-out infinite; }
      @keyframes brainOrbitDrift {
        0%, 100% { transform: rotate(0deg) scale(1); opacity: .45; }
        44% { transform: rotate(2.6deg) scale(1.01); opacity: .58; }
        72% { transform: rotate(-1.8deg) scale(.996); opacity: .50; }
      }
      @keyframes brainOrbitSpeak {
        0%, 100% { transform: rotate(0deg) scale(1); opacity: .88; }
        28% { transform: rotate(4deg) scale(1.015); opacity: 1; }
        55% { transform: rotate(-3deg) scale(.998); opacity: .72; }
        78% { transform: rotate(2deg) scale(1.006); opacity: .95; }
      }
      @keyframes brainFaceIdle {
        0%, 100% { transform: translate(0,0); }
        38% { transform: translate(1px,-.5px); }
        68% { transform: translate(-.8px,.4px); }
      }
      @keyframes brainBlinkLeft {
        0%, 88%, 100% { transform: scaleY(1); opacity: 1; }
        91% { transform: scaleY(.16); opacity: .45; }
        94% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes brainBlinkRight {
        0%, 88%, 100% { transform: scaleX(1); opacity: 1; }
        91% { transform: scaleX(.58); opacity: .45; }
        94% { transform: scaleX(1); opacity: 1; }
      }
      @keyframes brainStarPulse {
        0%, 100% { opacity: .42; }
        48% { opacity: .72; }
      }
    </style>
    <radialGradient id="space" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 120) scale(122)">
      <stop stop-color="#060b18" stop-opacity="0.24"/>
      <stop offset="0.72" stop-color="#060814" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#050713" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(124 116) rotate(124) scale(68 70)">
      <stop offset="0" stop-color="#223043"/>
      <stop offset="0.34" stop-color="#101827"/>
      <stop offset="0.72" stop-color="#050914"/>
      <stop offset="1" stop-color="#01030a"/>
    </radialGradient>
    <radialGradient id="softReflection" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(151 79) rotate(-28) scale(31 21)">
      <stop stop-color="#c7d7ea" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#7993b4" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#7993b4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depth" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(101 154) rotate(40) scale(42 36)">
      <stop stop-color="#264158" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#264158" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="82" y1="65" x2="167" y2="177" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe" stop-opacity="0.30"/>
      <stop offset="0.44" stop-color="#8aa4c8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="tcLed" x1="42" y1="74" x2="198" y2="186" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ef0001" stop-opacity="0"/>
      <stop offset="0.30" stop-color="#ef0001" stop-opacity="0.78"/>
      <stop offset="0.66" stop-color="#ef0001" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ef0001" stop-opacity="0"/>
    </linearGradient>
    <filter id="tcGlow" x="12" y="12" width="216" height="216" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.8" flood-color="#ef0001" flood-opacity="0.50"/>
      <feDropShadow dx="0" dy="0" stdDeviation="11" flood-color="#ef0001" flood-opacity="0.18"/>
    </filter>
    <filter id="eyeGlow" x="78" y="92" width="88" height="62" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#ffffff" flood-opacity="0.92"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#dbeafe" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="240" height="240" fill="transparent"/>
  <circle cx="120" cy="120" r="118" fill="url(#space)"/>

  <g class="brain-orbit-soft" opacity="0.45">
    <path d="M42 126a83 83 0 0 1 144-61" stroke="#ef0001" stroke-opacity="0.14" stroke-width="1" stroke-linecap="round"/>
    <path d="M188 72a76 76 0 0 1 15 56" stroke="#64748b" stroke-opacity="0.07" stroke-width="1" stroke-linecap="round"/>
  </g>

  <g class="brain-orbit-led" filter="url(#tcGlow)">
    <path d="M56 128a69 69 0 0 0 43 56" stroke="url(#tcLed)" stroke-width="2.7" stroke-linecap="round"/>
    <path d="M190 176a77 77 0 0 0 13-19" stroke="#ef0001" stroke-opacity="0.35" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="120" cy="120" r="55" fill="url(#orb)"/>
    <circle cx="120" cy="120" r="53" fill="url(#depth)"/>
    <circle cx="120" cy="120" r="55" stroke="url(#edge)" stroke-width="1.4"/>
    <circle cx="120" cy="120" r="53" stroke="#000" stroke-opacity="0.32" stroke-width="2"/>
    <ellipse cx="148" cy="80" rx="19" ry="13" fill="url(#softReflection)" transform="rotate(-30 148 80)"/>
  </g>

  <g class="brain-face" filter="url(#eyeGlow)" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <path class="brain-eye-left" d="M99 123l6-8 6 8" stroke-width="4"/>
    <path class="brain-eye-right" d="M136 119h15" stroke-width="4"/>
  </g>

  <g class="brain-star" opacity="0.5">
    <circle cx="52" cy="40" r="1.1" fill="#fff" opacity="0.16"/>
    <circle cx="83" cy="39" r="1.3" fill="#ef0001" opacity="0.34"/>
    <circle cx="198" cy="92" r="1.1" fill="#fff" opacity="0.18"/>
    <circle cx="194" cy="185" r="1.3" fill="#ef0001" opacity="0.36"/>
  </g>
</svg>
