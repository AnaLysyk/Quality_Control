name: Targeted local auth tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run targeted tests
        run: npx jest --config jest.config.ts --runInBand tests/api/backend/localAuthStore.memory.test.ts tests/api/backend/localAuthStore.disk.test.ts tests/api/backend/localAuthStore.crud.test.ts
