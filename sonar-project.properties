sonar.projectKey=AnaLysyk_Quality_Control
sonar.organization=analysyk
sonar.host.url=https://sonarcloud.io
sonar.projectVersion=2026.07.19-baseline

sonar.sourceEncoding=UTF-8
sonar.sources=app,backend,database,shared,src
sonar.tests=tests

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/.next-e2e/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/blob-report/**,**/dist/**,**/build/**,docs/**,tmp/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,tests/**,tools/**,database/**

sonar.cpd.exclusions=backend/i18n.ts,app/i18n/translations.ts,backend/navigation/route-map.ts,backend/navigation/navigationCatalog.ts,database/repositories/automationStudio.ts,app/brain/_data/brainMockGraph.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
