<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <radialGradient id="orbFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(155 132) rotate(112) scale(86 88)">
      <stop offset="0" stop-color="#1c3042"/>
      <stop offset="0.42" stop-color="#0a1726"/>
      <stop offset="0.74" stop-color="#030814"/>
      <stop offset="1" stop-color="#01030a"/>
    </radialGradient>
    <radialGradient id="orbDepth" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(118 188) rotate(46) scale(64 54)">
      <stop stop-color="#ff365d" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#ff365d" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#ff365d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glassShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(181 105) rotate(-25) scale(36 24)">
      <stop stop-color="#f8fcff" stop-opacity="0.58"/>
      <stop offset="0.45" stop-color="#cfe2fb" stop-opacity="0.19"/>
      <stop offset="1" stop-color="#cfe2fb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coolEdge" x1="100" y1="80" x2="214" y2="208" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ecf6ff" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#97bce9" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="redStroke" x1="84" y1="122" x2="126" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff3e68" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#ff3e68" stop-opacity="0.8"/>
      <stop offset="0.68" stop-color="#ff3e68" stop-opacity="1"/>
      <stop offset="1" stop-color="#ff3e68" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="redGlow" x="24" y="38" width="252" height="242" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff365d" flood-opacity="0.54"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ff365d" flood-opacity="0.22"/>
    </filter>
    <filter id="eyeGlow" x="94" y="122" width="116" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
