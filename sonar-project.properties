sonar.projectKey=AnaLysyk_Quality_Control
sonar.organization=analysyk
sonar.projectName=Quality Control
sonar.host.url=https://sonarcloud.io

sonar.sourceEncoding=UTF-8
sonar.sources=app,data,lib,packages,scripts,src
sonar.tests=tests,tests-e2e,__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/.next-e2e/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/blob-report/**,**/dist/**,**/build/**,docs/**,tmp/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,tests/**,tests-e2e/**,__tests__/**,scripts/**,data/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.qualitygate.wait=true
