name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_DISABLE_FONT_DOWNLOAD: "1"
      SKIP_PRISMA_MIGRATE: "true"
      E2E_USE_JSON: "1"
      AUTH_STORE: "json"
      USE_JSON_STORE: "true"
      TICKETS_STORE: "json"
      EMAIL_CAPTURE_MODE: "file"
      EMAIL_CAPTURE_FILE: "test-results/emails/outbox.jsonl"
      ACCESS_REQUEST_EMAIL_BYPASS: "true"
      ACCESS_REQUEST_BLOCK_DUPLICATES: "true"
      EMAIL_CAPTURE_MODE_REASON: "CI must never send real SMTP messages"
      FORCE_EMAIL_SEND: "false"
      E2E_SEND_REAL_EMAIL: "false"
      PLAYWRIGHT_REAL_EMAIL: "false"
      JWT_SECRET: "quality-control-ci-secret"
      NEXT_PUBLIC_SITE_URL: "http://127.0.0.1:3100"
      NEXT_PUBLIC_BASE_URL: "http://127.0.0.1:3100"
      APP_URL: "http://127.0.0.1:3100"
      PUBLIC_BASE_URL: "http://127.0.0.1:3100"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Prepare isolated test directories
        shell: bash
        run: |
          mkdir -p test-results/emails .tmp/e2e-auth
          : > "$EMAIL_CAPTURE_FILE"

      - name: Block obvious committed database secrets
        shell: bash
        run: |
          db_url_re='postgres(ql)?://[^[:space:]]+@[^[:space:]]+'
          safe_host_re='@(localhost|127\.0\.0\.1)([:/]|$)'
          matches=$(git grep -nE "$db_url_re" -- .github scripts app lib ':!.github/workflows/ci.yml' || true)
          leaks=$(printf '%s\n' "$matches" | grep -vE "$safe_host_re" || true)
          if [ -n "$leaks" ]; then
            echo "Found an obvious committed database URL. Replace it with an environment variable before merging."
            printf '%s\n' "$leaks"
            exit 1
          fi

      - name: Lint changed source files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="HEAD~1"
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMRT "$base" "$head" | grep -E '\.(js|jsx|ts|tsx|mjs|cjs)$' || true)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed JS/TS files to lint."
            exit 0
          fi

          printf 'Linting changed source files:\n'
          printf ' - %s\n' "${files[@]}"
          npx eslint --max-warnings 9999 "${files[@]}"

      - name: Build
        shell: bash
        run: |
          export DATABASE_URL="$(printf '%s://%s:%s@%s:%s/%s?schema=public' postgresql ci ci 127.0.0.1 5432 ci)"
          npm run build

      - name: Run Node tests with captured email
        shell: bash
        env:
          NODE_ENV: test
        run: |
          export DATABASE_URL="$(printf '%s://%s:%s@%s:%s/%s?schema=public' postgresql ci ci 127.0.0.1 5432 ci)"
          npm run test

      - name: Upload captured test emails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captured-test-emails
          path: test-results/emails/outbox.jsonl
          if-no-files-found: ignore
