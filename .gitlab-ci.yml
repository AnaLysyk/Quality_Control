stages:
  - test

db-security-check:
  stage: test
  image: postgres:15
  script:
    - chmod +x ./scripts/db-security-check.sh
    - ./scripts/db-security-check.sh
  only:
    - branches
    - merge_requests

# Optional job using allowlist script

db-security-check-allowlist:
  stage: test
  image: postgres:15
  script:
    - chmod +x ./scripts/db-security-check-allowlist.sh
    - ./scripts/db-security-check-allowlist.sh
  only:
    - branches
    - merge_requests
