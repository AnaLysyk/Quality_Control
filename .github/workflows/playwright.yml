name: Testes E2E Playwright

on:
  push:
    branches: [main, 'e2e/**']
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache de módulos Node
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps

      - name: Iniciar servidor de desenvolvimento
        run: |
          export E2E_USE_JSON=1
          export SUPABASE_MOCK=true
          PORT=3100 npm run dev &
          npx wait-on http://127.0.0.1:3100 --timeout 120000

      - name: Executar testes Playwright
        run: npx playwright test --reporter=github
        env:
          CI: true
          PORT: 3100

      - name: Upload do relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload dos resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

  prod-smoke:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps

      - name: Validar credenciais Playwright
        if: ${{ secrets.PLAYWRIGHT_EMAIL == '' || secrets.PLAYWRIGHT_PASSWORD == '' }}
        run: |
          echo "Credenciais Playwright ausentes. Configure PLAYWRIGHT_EMAIL/PLAYWRIGHT_PASSWORD." >&2
          exit 1

      - name: Executar E2E em produção
        env:
          # Estes segredos devem ser adicionados nas Configurações do Repositório > Secrets > Actions
          PLAYWRIGHT_EMAIL: ${{ secrets.PLAYWRIGHT_EMAIL }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
        run: npm run test:e2e:prod

      - name: Upload do relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report
