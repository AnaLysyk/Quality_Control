name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check frontend API health
        run: |
          URL="${{ secrets.HEALTHCHECK_URL }}"
          if [ -z "$URL" ]; then
            URL="https://qualitycontrol.vercel.app/api/health"
          fi
          curl -fsSL "$URL" >/dev/null
      - name: Check backend health (optional)
        run: |
          URL="${{ secrets.BACKEND_HEALTHCHECK_URL }}"
          if [ -z "$URL" ]; then
            echo "BACKEND_HEALTHCHECK_URL not set, skipping"
            exit 0
          fi
          curl -fsSL "$URL" >/dev/null
