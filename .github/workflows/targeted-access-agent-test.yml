name: Targeted access agent test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run targeted test
        id: targeted
        continue-on-error: true
        run: npx jest --config jest.config.ts --runInBand tests/api/assistant/accessRequestsClientAgent.test.ts > /tmp/targeted-test.log 2>&1
      - name: Print targeted test result
        if: always()
        run: tail -120 /tmp/targeted-test.log
      - name: Preserve targeted test failure
        if: steps.targeted.outcome == 'failure'
        run: exit 1
