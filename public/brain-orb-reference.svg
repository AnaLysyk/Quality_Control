      <stop stop-color="#f7fbff" stop-opacity="0.50"/>
      <stop offset="0.45" stop-color="#bdd6f6" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#9dbde7" stop-opacity="0"/>
    </radialGradient>
