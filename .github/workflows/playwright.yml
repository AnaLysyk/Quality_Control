# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_EMAIL: ${{ secrets.PLAYWRIGHT_EMAIL }}
      PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Detect Playwright target
        id: target
        shell: bash
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "has_external_url=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_external_url=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app for local Playwright
        if: steps.target.outputs.has_external_url == 'false'
        run: npm run build
        env:
          CI: "true"
          SUPABASE_MOCK: "true"

      - name: Start local app
        if: steps.target.outputs.has_external_url == 'false'
        shell: bash
        run: |
          npm run start &
          npx wait-on http://127.0.0.1:3000

      - name: Run Playwright against local app
        if: steps.target.outputs.has_external_url == 'false'
        run: npx playwright test
        env:
          CI: "true"
          SUPABASE_MOCK: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Run Playwright against configured URL
        if: steps.target.outputs.has_external_url == 'true'
        run: npm run test:e2e:prod

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
