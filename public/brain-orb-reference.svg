<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <radialGradient id="space" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 120) scale(122)">
      <stop stop-color="#071021" stop-opacity="0.52"/>
      <stop offset="0.7" stop-color="#080815" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#090713" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(126 118) rotate(125) scale(64 67)">
      <stop offset="0" stop-color="#2b4052"/>
      <stop offset="0.42" stop-color="#101c2a"/>
      <stop offset="0.76" stop-color="#040914"/>
      <stop offset="1" stop-color="#01030a"/>
    </radialGradient>
    <radialGradient id="blueShine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(139 76) rotate(-24) scale(45 30)">
      <stop stop-color="#f7fbff" stop-opacity="0.46"/>
      <stop offset="0.45" stop-color="#bdd6f6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9dbde7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(91 151) rotate(46) scale(52 44)">
      <stop stop-color="#ff355f" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#ff355f" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ff355f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="82" y1="65" x2="167" y2="177" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eaf4ff" stop-opacity="0.54"/>
      <stop offset="0.42" stop-color="#8baed9" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="redCrescent" x1="66" y1="104" x2="92" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff3863" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#ff3863" stop-opacity="0.85"/>
      <stop offset="0.76" stop-color="#ff3863" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#ff3863" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="redGlow" x="20" y="20" width="200" height="200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3.4" flood-color="#ff3863" flood-opacity="0.78"/>
      <feDropShadow dx="0" dy="0" stdDeviation="13" flood-color="#ff3863" flood-opacity="0.25"/>
    </filter>
    <filter id="eyeGlow" x="80" y="92" width="88" height="62" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#d9ecff" flood-opacity="0.28"/>
    </filter>
    <filter id="softBlur" x="20" y="20" width="200" height="200" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="13"/>
    </filter>
  </defs>

  <rect width="240" height="240" fill="transparent"/>
  <circle cx="120" cy="120" r="118" fill="url(#space)"/>

  <g opacity="0.75">
    <circle cx="121" cy="120" r="93" stroke="#6f8fba" stroke-opacity="0.06" stroke-width="1"/>
    <circle cx="121" cy="120" r="72" stroke="#ff3863" stroke-opacity="0.13" stroke-width="1"/>
    <path d="M39 125a86 86 0 0 1 151-57" stroke="#ff3863" stroke-opacity="0.26" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M57 155a72 72 0 0 1 37-88" stroke="#ff3863" stroke-opacity="0.17" stroke-width="1" stroke-linecap="round"/>
    <path d="M186 73a76 76 0 0 1 18 59" stroke="#dcecff" stroke-opacity="0.09" stroke-width="1" stroke-linecap="round"/>
  </g>

  <circle cx="120" cy="120" r="62" fill="url(#redCore)" filter="url(#softBlur)" opacity="0.66"/>

  <g filter="url(#redGlow)">
    <path d="M57 127a66 66 0 0 1 120-41" stroke="#ff3863" stroke-opacity="0.22" stroke-width="1" stroke-linecap="round"/>
    <path d="M57 127a70 70 0 0 0 41 55" stroke="#ff3863" stroke-opacity="0.72" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M190 176a75 75 0 0 0 13-19" stroke="#ff3863" stroke-opacity="0.40" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="120" cy="120" r="53" fill="url(#orb)"/>
    <circle cx="120" cy="120" r="54" stroke="url(#edge)" stroke-width="1.5"/>
    <circle cx="120" cy="120" r="52" stroke="#ffffff" stroke-opacity="0.05"/>
    <path d="M69 120a52 52 0 0 0 33 50" stroke="url(#redCrescent)" stroke-width="3" stroke-linecap="round" filter="url(#redGlow)"/>
    <ellipse cx="145" cy="82" rx="24" ry="17" fill="url(#blueShine)" transform="rotate(-30 145 82)"/>
    <circle cx="120" cy="120" r="54" stroke="#000" stroke-opacity="0.26" stroke-width="2"/>
  </g>

  <g filter="url(#eyeGlow)" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M99 119l7 7 7-7"/>
    <path d="M137 120h14"/>
  </g>

  <g opacity="0.7">
    <circle cx="52" cy="40" r="1.2" fill="#fff" opacity="0.22"/>
    <circle cx="83" cy="39" r="1.4" fill="#ff3863" opacity="0.44"/>
    <circle cx="198" cy="92" r="1.2" fill="#fff" opacity="0.30"/>
    <circle cx="194" cy="185" r="1.4" fill="#ff3863" opacity="0.46"/>
  </g>
</svg>
