# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: "true"
      NEXT_DISABLE_FONT_DOWNLOAD: "1"
      SKIP_PRISMA_MIGRATE: "true"
      E2E_USE_JSON: "1"
      AUTH_STORE: "json"
      USE_JSON_STORE: "true"
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_EMAIL: ${{ secrets.PLAYWRIGHT_EMAIL }}
      PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Detect Playwright target
        id: target
        shell: bash
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "has_external_url=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_external_url=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app for local Playwright
        if: steps.target.outputs.has_external_url == 'false'
        shell: bash
        run: |
          export DATABASE_URL="$(printf '%s://%s:%s@%s:%s/%s?schema=public' postgresql ci ci 127.0.0.1 5432 ci)"
          npm run build

      - name: Start local app
        if: steps.target.outputs.has_external_url == 'false'
        shell: bash
        run: |
          export DATABASE_URL="$(printf '%s://%s:%s@%s:%s/%s?schema=public' postgresql ci ci 127.0.0.1 5432 ci)"
          npm run start &
          npx wait-on http://127.0.0.1:3000

      - name: Run Playwright against local app
        if: steps.target.outputs.has_external_url == 'false'
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Run Playwright against configured URL
        if: steps.target.outputs.has_external_url == 'true'
        run: npm run test:e2e:prod

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
