name: Testes E2E Playwright

on:
  push:
    branches: [main, 'e2e/**']
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache de módulos Node
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Instalar dependências
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps

      - name: Iniciar servidor de desenvolvimento
        run: |
          export E2E_USE_JSON=1

          PORT=3100 npm run dev &
          npx wait-on http://127.0.0.1:3100 --timeout 120000

      - name: Executar testes Playwright
        run: npx playwright test --reporter=github
        env:
          CI: true
          PORT: 3100

      - name: Upload do relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload dos resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
