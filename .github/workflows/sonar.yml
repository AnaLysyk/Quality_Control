name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      NEXT_DISABLE_FONT_DOWNLOAD: "1"
      SKIP_PRISMA_MIGRATE: "true"
      E2E_USE_JSON: "1"
      AUTH_STORE: "json"
      USE_JSON_STORE: "true"
      # Só satisfaz a validação do prisma.config.ts (exige a env var definida
      # pra rodar "prisma generate"); os testes usam AUTH_STORE=json/
      # USE_JSON_STORE=true acima, não conectam nesse banco de verdade.
      DATABASE_URL: "postgresql://user:password@localhost:5432/quality_control_ci"

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
