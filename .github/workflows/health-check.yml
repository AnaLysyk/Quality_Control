name: Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check frontend API health
        run: |
          curl -fsSL "https://quality-control-qwqs.onrender.com/api/health" >/dev/null
      - name: Check backend health (optional)
        run: |
          echo "Backend health check not configured, skipping"
